<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>EasyRide | Admin Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap'); body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#F8FAFC] font-sans text-slate-800">
    <script>if(localStorage.getItem('EZ_ROLE') !== 'admin') window.location.href = 'auth.html';</script>

    <nav class="bg-white border-b border-slate-100 px-10 py-5 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3"><div class="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg italic"><i class="fas fa-user-shield text-xl"></i></div><h1 class="text-2xl font-black italic text-slate-900 tracking-tighter uppercase">EasyRide Admin</h1></div>
        <button onclick="localStorage.removeItem('EZ_ROLE'); window.location.href='auth.html'" class="bg-red-50 text-red-600 px-6 py-2 rounded-2xl font-black transition-all uppercase text-xs">Logout</button>
    </nav>

    <div class="flex">
        <aside class="w-64 bg-white border-r border-slate-100 h-screen p-8 sticky top-[80px]">
            <nav class="space-y-4">
                <button onclick="tab('d')" id="btnd" class="w-full text-left p-4 rounded-2xl font-black bg-indigo-50 text-indigo-700 transition-all">Dashboard</button>
                <button onclick="tab('u')" id="btnu" class="w-full text-left p-4 rounded-2xl font-black text-slate-400">Users List</button>
                <button onclick="tab('dr')" id="btndr" class="w-full text-left p-4 rounded-2xl font-black text-slate-400">Drivers DB</button>
                <div class="pt-32"><button onclick="purge()" class="text-[10px] font-black uppercase text-red-300 tracking-widest">Reset System</button></div>
            </nav>
        </aside>

        <main class="flex-1 p-12">
            <div id="sd">
                <div class="bg-white p-6 rounded-3xl mb-8 flex gap-4 items-center shadow-sm border border-slate-100">
                    <i class="fas fa-filter text-indigo-400 ml-2"></i>
                    <select id="fVeh" onchange="masterSync()" class="bg-slate-50 p-2 rounded-xl text-xs font-bold outline-none border-none"><option value="All">All Vehicles</option><option value="Bike">Bike</option><option value="Mini">Mini</option><option value="Sedan">Sedan</option></select>
                    <select id="fPay" onchange="masterSync()" class="bg-slate-50 p-2 rounded-xl text-xs font-bold outline-none border-none"><option value="All">All Payments</option><option value="Cash">Cash</option><option value="UPI">UPI</option></select>
                </div>
                <div class="grid grid-cols-2 gap-10 mb-12">
                    <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-50 flex justify-between items-center"><div><p class="text-slate-400 text-[10px] font-black uppercase">Bookings</p><h2 id="stR" class="text-6xl font-black mt-2">0</h2></div><div class="h-16 w-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-car-side"></i></div></div>
                    <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-50 flex justify-between items-center"><div><p class="text-slate-400 text-[10px] font-black uppercase">Revenue</p><h2 id="stF" class="text-6xl font-black mt-2 text-indigo-600">₹0</h2></div><div class="h-16 w-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-wallet"></i></div></div>
                </div>
                <div class="bg-white rounded-[3rem] shadow-xl border border-slate-50 overflow-hidden text-sm">
                    <table class="w-full text-left"><thead class="bg-gray-50 text-[10px] font-black uppercase"><tr><th class="p-6">Ride ID</th><th class="p-6">Customer / Driver</th><th class="p-6">Vehicle</th><th class="p-6 text-right">Fare / Rating</th></tr></thead>
                    <tbody id="rtb" class="divide-y divide-slate-50"></tbody></table>
                </div>
            </div>

            <!-- DRIVERS DB -->
            <div id="sdr" class="hidden">
                <div class="bg-white p-8 rounded-[3rem] shadow-xl mb-10 border border-indigo-50">
                    <h3 class="font-black text-xl mb-6">Add New Driver</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="drN" placeholder="Full Name" class="bg-slate-50 p-4 rounded-2xl outline-none font-bold">
                        <select id="drT" class="bg-slate-50 p-4 rounded-2xl outline-none font-bold text-slate-500"><option value="Mini">Mini</option><option value="Bike">Bike</option><option value="Sedan">Sedan</option></select>
                        <input type="text" id="drV" placeholder="Vehicle No" class="bg-slate-50 p-4 rounded-2xl outline-none font-bold">
                        <button onclick="addDr()" class="bg-indigo-600 text-white p-4 rounded-2xl font-black hover:bg-indigo-700">Save</button>
                    </div>
                </div>
                <div class="bg-white rounded-[3rem] shadow-xl border overflow-hidden text-sm"><table class="w-full text-left"><thead class="bg-gray-50 text-[10px] font-black uppercase"><tr><th class="p-6">Name</th><th class="p-6">Type</th><th class="p-6">Vehicle No</th><th class="p-6">Avg Rating</th><th class="p-6 text-right">Action</th></tr></thead>
                <tbody id="drtb" class="divide-y divide-slate-50"></tbody></table></div>
            </div>

            <!-- USERS LIST -->
            <div id="su" class="hidden"><div class="bg-white rounded-[3rem] shadow-xl border border-slate-50 overflow-hidden text-sm"><table class="w-full text-left"><thead class="bg-gray-50 text-[10px] font-black uppercase"><tr><th class="p-6">Name</th><th class="p-6">Contact Info</th><th class="p-6 text-right">Delete</th></tr></thead>
            <tbody id="utb" class="divide-y divide-slate-50"></tbody></table></div></div>
        </main>
    </div>

    <script>
        function tab(t) {
            document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('s'+t).classList.remove('hidden');
            const btns = {'d':'btnd', 'u':'btnu', 'dr':'btndr'};
            Object.keys(btns).forEach(k => document.getElementById(btns[k]).className = k===t ? "w-full text-left p-4 rounded-2xl font-black bg-indigo-50 text-indigo-700 transition-all shadow-sm" : "w-full text-left p-4 rounded-2xl font-black text-slate-400 hover:bg-gray-50");
            masterSync();
        }

        function getStars(n) { let s = ''; for(let i=0; i<5; i++) s += `<i class="fa${i<n?'s':'r'} fa-star text-amber-400 text-[10px]"></i>`; return s; }

        function calculateAvg(n, rs) {
            const drRs = rs.filter(r => r.driver === n);
            if(drRs.length === 0) return "N/A";
            return (drRs.reduce((a, r) => a + Number(r.rating), 0) / drRs.length).toFixed(1) + ' ★';
        }

        function masterSync() {
            const db = JSON.parse(localStorage.getItem('EASY_RIDE_MASTER_DB')) || { users: [], rides: [], drivers: [] };
            const fV = document.getElementById('fVeh').value;
            const fP = document.getElementById('fPay').value;

            const fR = (db.rides || []).filter(r => (fV==='All' || r.vehicle===fV) && (fP==='All' || r.payment===fP));
            document.getElementById('stR').innerText = fR.length;
            const rev = fR.reduce((a, r) => a + parseInt(r.fare.replace('₹','')), 0);
            document.getElementById('stF').innerText = "₹" + rev;

            document.getElementById('rtb').innerHTML = fR.slice().reverse().map(r => `
                <tr class="hover:bg-slate-50 transition-all border-b border-slate-50">
                    <td class="p-6 font-mono text-indigo-600 font-bold uppercase text-xs">${r.id}</td>
                    <td class="p-6"><b>${r.user}</b><br><small class="text-slate-400 font-bold text-[9px]">Driver: ${r.driver}</small></td>
                    <td class="p-6 uppercase font-bold text-[10px] text-slate-500">${r.vehicle}<br><small class="text-indigo-400 italic">${r.payment}</small></td>
                    <td class="p-6 text-right font-black"><b>${r.fare}</b><br>${getStars(r.rating)}</td>
                </tr>`).join('');

            document.getElementById('drtb').innerHTML = (db.drivers || []).map((d, i) => `
                <tr><td class="p-6 font-bold text-slate-700">${d.name}</td>
                <td class="p-6"><span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">${d.type}</span></td>
                <td class="p-6 font-mono font-bold text-slate-400 uppercase italic">${d.veh}</td>
                <td class="p-6 font-bold">${calculateAvg(d.name, db.rides || [])}</td>
                <td class="p-6 text-right"><button onclick="delDr(${i})" class="text-red-300 hover:text-red-500 transition-all"><i class="fas fa-trash-alt"></i></button></td></tr>`).join('');

            document.getElementById('utb').innerHTML = (db.users || []).map((u, i) => `
                <tr><td class="p-6 font-bold text-slate-700">${u.name}</td><td class="p-6 text-slate-400 font-bold">${u.email || u.phone}</td><td class="p-6 text-right"><button onclick="delU(${i})" class="text-red-300 hover:text-red-500 transition-all"><i class="fas fa-trash-alt"></i></button></td></tr>`).join('');
        }

        function addDr() {
            const n = document.getElementById('drN').value, t = document.getElementById('drT').value, v = document.getElementById('drV').value;
            if(!n || !v) return alert("Fill all fields!");
            let db = JSON.parse(localStorage.getItem('EASY_RIDE_MASTER_DB')) || { users: [], rides: [], drivers: [] };
            if(!db.drivers) db.drivers = [];
            db.drivers.push({ name: n, type: t, veh: v });
            localStorage.setItem('EASY_RIDE_MASTER_DB', JSON.stringify(db));
            document.getElementById('drN').value = ''; document.getElementById('drV').value = '';
            alert("Driver Saved!"); masterSync();
        }

        function delDr(i) { let db = JSON.parse(localStorage.getItem('EASY_RIDE_MASTER_DB')); db.drivers.splice(i,1); localStorage.setItem('EASY_RIDE_MASTER_DB', JSON.stringify(db)); masterSync(); }
        function delU(i) { let db = JSON.parse(localStorage.getItem('EASY_RIDE_MASTER_DB')); db.users.splice(i,1); localStorage.setItem('EASY_RIDE_MASTER_DB', JSON.stringify(db)); masterSync(); }
        function purge() { if(prompt("Pass:") === "Reset99") { localStorage.removeItem('EASY_RIDE_MASTER_DB'); location.reload(); } }

        window.addEventListener('storage', masterSync);
        masterSync();
    </script>
</body>
</html>
